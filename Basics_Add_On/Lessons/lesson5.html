<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=
  , initial-scale=1.0" />

    <title>Class Manipulation</title>

    <style>
    
    body{
        background-color: white;
        color: black;
    }

    button {
        background: black;
        color: white;
    }

    body.dark{
        background-color: black;
        color: white;

    }


   
    </style>
</head>

<body>
  <div>
<button>Dark theme</button>
</div>

<script>
function makeItDark() {
    let dark = document.querySelector("body");
    body.classList.add("dark");
}
    let button = document.querySelector("button");
    button.addEventListener("click", makeItDark);

</script>
</body>

</html>
